<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pokemon Mobile Debug</title>
  <style>
    body {
      margin: 0;
      padding: 16px;
      font: 14px/1.45 Consolas, Monaco, monospace;
      color: #e5f0ff;
      background: #0b1020;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 18px;
      color: #f8d447;
    }
    .panel {
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 12px;
      padding: 12px;
      margin: 10px 0;
      background: rgba(255,255,255,.06);
      word-break: break-word;
      white-space: pre-wrap;
    }
    .ok { color: #6ee7b7; }
    .bad { color: #fca5a5; }
    .warn { color: #fde68a; }
    a {
      color: #93c5fd;
      display: inline-block;
      margin: 8px 8px 8px 0;
    }
    iframe {
      width: 1px;
      height: 1px;
      opacity: .01;
      position: absolute;
      left: -9999px;
      top: -9999px;
    }
  </style>
</head>
<body>
  <h1>Pokemon Mobile Debug</h1>
  <div>
    <a href="/pokemon-vn/?v=20260421d">Open root loader</a>
    <a href="/game.json?poc=20260421d">Open direct game shell</a>
  </div>
  <div id="log" class="panel">Starting checks...</div>
  <iframe id="gameFrame" src="/game.json?poc=20260421d"></iframe>

  <script>
    (function () {
      var logEl = document.getElementById('log');
      var lines = [];

      function add(status, message) {
        var cls = status === 'OK' ? 'ok' : status === 'WARN' ? 'warn' : 'bad';
        lines.push('<span class="' + cls + '">' + status + '</span> ' + escapeHtml(message));
        logEl.innerHTML = lines.join('\n');
      }

      function escapeHtml(text) {
        return String(text).replace(/[&<>"']/g, function (ch) {
          return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' })[ch];
        });
      }

      window.onerror = function (message, source, line, col) {
        add('ERR', 'window.onerror: ' + message + ' @ ' + source + ':' + line + ':' + col);
      };

      window.onunhandledrejection = function (event) {
        add('ERR', 'unhandledrejection: ' + (event.reason && event.reason.message ? event.reason.message : event.reason));
      };

      add('OK', 'location=' + location.href);
      add('OK', 'userAgent=' + navigator.userAgent);
      add('OK', 'viewport=' + window.innerWidth + 'x' + window.innerHeight);
      add('OK', 'devicePixelRatio=' + (window.devicePixelRatio || 1));

      var urls = [
        '/pokemon-vn/',
        '/pokemon-vn/sql/game.js?poc=20260421c',
        '/game.json?poc=20260421d',
        '/sql/database.js?ab',
        '/sql/ducnghia.js?code',
        '/sql/data.js?poc=20260421a',
        '/sql/en-us-overlay.js?poc=20260421b',
        '/img/t/menu.png',
        '/images/items/Master%20ball.png'
      ];

      function checkUrl(url) {
        var started = Date.now();
        return fetch(url, { cache: 'no-store', credentials: 'same-origin' })
          .then(function (response) {
            return response.text().then(function (text) {
              var elapsed = Date.now() - started;
              add(response.ok ? 'OK' : 'ERR', url + ' status=' + response.status + ' type=' + (response.headers.get('content-type') || '-') + ' len=' + text.length + ' ms=' + elapsed);
              if (url.indexOf('game.json') !== -1) {
                add(text.indexOf('cvsGame') !== -1 ? 'OK' : 'ERR', '/game.json contains cvsGame=' + (text.indexOf('cvsGame') !== -1));
                add(text.indexOf('Fatal error') === -1 && text.indexOf('Parse error') === -1 ? 'OK' : 'ERR', '/game.json fatal/parse error=' + (text.indexOf('Fatal error') !== -1 || text.indexOf('Parse error') !== -1));
              }
            });
          })
          .catch(function (error) {
            add('ERR', url + ' fetch failed: ' + error.message);
          });
      }

      Promise.all(urls.map(checkUrl)).then(function () {
        add('OK', 'fetch checks completed');
      });

      var iframeTimeout = setTimeout(function () {
        add('ERR', 'iframe /game.json did not finish loading within 12 seconds');
      }, 12000);

      document.getElementById('gameFrame').addEventListener('load', function () {
        clearTimeout(iframeTimeout);
        add('OK', 'iframe /game.json load event fired');
        try {
          var doc = this.contentWindow.document;
          add('OK', 'iframe readyState=' + doc.readyState);
          add(doc.getElementById('cvsGame') ? 'OK' : 'ERR', 'iframe has cvsGame=' + !!doc.getElementById('cvsGame'));
          add(doc.body && doc.body.innerText.indexOf('Fatal error') === -1 ? 'OK' : 'ERR', 'iframe visible fatal error=' + (doc.body ? doc.body.innerText.indexOf('Fatal error') !== -1 : 'no-body'));
        } catch (error) {
          add('ERR', 'iframe inspect failed: ' + error.message);
        }
      });
    })();
  </script>
</body>
</html>
