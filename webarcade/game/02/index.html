<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>Breakout Assault | Webarcade</title>

  <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1, maximum-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">
  <meta name="renderer" content="webkit">
  <meta name="force-rendering" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="msapplication-tap-highlight" content="no">
  <meta name="full-screen" content="yes">
  <meta name="x5-fullscreen" content="true">
  <meta name="360-fullscreen" content="true">
  <meta name="x5-page-mode" content="app">

  <meta name="description" content="在线H5小游戏-游戏大全，提供最新、最热门的在线游戏。">
  <meta name="keywords" content="游戏,小游戏,在线游戏,免费游戏">
  <meta name="author" content="在线H5小游戏-游戏大全">

  <!-- 样式控制 -->
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
    }

    body, canvas, div {
      display: block;
      outline: none;
      -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
      user-select: none;
      -moz-user-select: none;
      -webkit-user-select: none;
      -ms-user-select: none;
      font-family: Helvetica, Verdana, Arial, sans-serif;
    }

    #GameDiv {
      width: 375px;
      height: 100%;
      margin: 0 auto;
      position: relative;
      background: #000;
    }

    #Cocos3dGameContainer,
    #GameCanvas {
      width: 100%;
      height: 100%;
    }

    canvas {
      background-color: rgba(0, 0, 0, 0);
    }

    /* 可选：屏幕太宽时显示提示文字 */
    @media screen and (min-width: 550px) {
        #GameDiv::before {
          content: "请在手机端访问本游戏，本游戏二维码如下：";
          position: absolute;
          color: white;
          top: 40%;
          left: 0;
          width: 100%;
          text-align: center;
          font-size: 18px;
          z-index: 99;
        }
        
        #GameDiv::after {
          content: "";
          position: absolute;
          top: 48%;
          left: 50%;
          transform: translateX(-50%);
          width: 120px;
          height: 120px;
          background-image: url('/src/skins/ewm.png'); /* 👉 替换为你的二维码地址 */
          background-size: contain;
          background-repeat: no-repeat;
          z-index: 99;
        }


      #Cocos3dGameContainer,
      #GameCanvas {
        display: none !important;
      }
    }
    
        /* 游戏图标按钮样式 */
        .more-games-btn {
            position: fixed;
            top: 10px;
            right: 10px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
            border-radius: 50%;
            text-decoration: none;
            z-index: 9999;
            transition: all 0.2s ease;
        }
        
        .more-games-btn:hover {
            background: rgba(255, 255, 255, 0.8);
            color: #000;
        }
        
        /* Tooltip 提示文字 */
        .more-games-btn::after {
            content: "更多游戏";
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        
        .more-games-btn:hover::after {
            opacity: 1;
        }
  </style>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob:; connect-src 'self'; img-src 'self' data: blob:; media-src 'self' data: blob:; font-src 'self' data:; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob:; style-src 'self' 'unsafe-inline'; frame-src 'self'; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'"/>
</head>

<body>
  <div id="GameDiv" cc_exact_fit_screen="true">
    <div id="Cocos3dGameContainer">
      <canvas id="GameCanvas" oncontextmenu="event.preventDefault()" tabindex="99"></canvas>
    </div>
        <!-- 游戏图标按钮（带Tooltip提示） -->
    <a href="/" class="more-games-btn" target="_blank">🎮</a>
  </div>

  <!-- Polyfills bundle -->
  <script src="../browser-safe-shim.js"></script>
<script src="../user-save-bridge.js"></script>
<script src="src/polyfills.bundle.js" charset="utf-8"></script>
  <!-- SystemJS support -->
  <script src="src/system.bundle.js" charset="utf-8"></script>
  <!-- Import map -->
  <script src="src/import-map.json" type="systemjs-importmap" charset="utf-8"></script>
  <!-- Main JS -->
  <script>
    System.import('./index.js').catch(function(err) { console.error(err); });
  </script>
</body>
</html>
