      <stop offset="1" stop-color="#6c8f55"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d7f5a2"/>
      <stop offset="1" stop-color="#6f9b4a"/>
