<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-labelledby="title desc">
  <title id="title">GB GBC Fallback Cover</title>
  <desc id="desc">Fallback artwork for Game Boy and Game Boy Color games.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="50%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" rx="32" fill="url(#bg)"/>
  <rect x="40" y="40" width="560" height="280" rx="24" fill="none" stroke="url(#accent)" stroke-width="2"/>
  <rect x="424" y="88" width="120" height="168" rx="20" fill="#0f172a" opacity="0.45" stroke="#a5b4fc" stroke-width="1.5"/>
  <rect x="456" y="120" width="56" height="56" rx="12" fill="#818cf8" opacity="0.28"/>
  <text x="64" y="88" fill="#c7d2fe" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700">POCKET FAVORITES</text>
  <text x="64" y="144" fill="#ffffff" font-size="56" font-family="Segoe UI, Arial, sans-serif" font-weight="900">GB / GBC</text>
  <text x="64" y="184" fill="#a5b4fc" font-size="22" font-family="Segoe UI, Arial, sans-serif">Portable library fallback cover</text>
  <text x="64" y="244" fill="#f8fafc" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="800">Classic handheld archive</text>
  <text x="64" y="294" fill="#c7d2fe" font-size="18" font-family="Segoe UI, Arial, sans-serif">Curated for mobile and desktop</text>
</svg>
