<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="在线游戏大全，提供最新、最热门的在线游戏。涵盖动作、棋牌、益智、策略、3D、休闲、射击、红白机、经典、赛车、闯关等多种类型，所有游戏均可免费畅玩，满足你的游戏需求！">
    <meta name="keywords" content="游戏, 游戏大全, 游戏推荐, 动作游戏, 冒险游戏, 角色扮演游戏, 策略游戏, 摸鱼游戏, 网页游戏, 在线游戏, 免费游戏, 在线游戏, 小游戏, 休闲游戏, 多人游戏, 单机游戏">
    <link rel="shortcut icon" href="common-file/img/ilove-logo-6.png">
    <style>
        :root {
            --primary-color: #3498db;
            --secondary-color: #e74c3c;
            --dark-color: #2c3e50;
            --light-color: #ecf0f1;
            --background-color: #f5f7fa;
            --white: #ffffff;
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            --transition: all 0.3s ease;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', 'Microsoft YaHei', sans-serif;
            background-color: var(--background-color);
            color: var(--dark-color);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: radial-gradient(circle at 10% 20%, rgba(52, 152, 219, 0.05) 0%, rgba(52, 152, 219, 0.05) 90%);
            overflow: hidden;
        }
        
.container {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}
        
        .error-card {
            background: var(--white);
            border-radius: 16px;
            box-shadow: var(--shadow);
            padding: 50px 40px;
            position: relative;
            overflow: hidden;
            transition: var(--transition);
                max-height: 90vh;
    overflow-y: auto;
        }
        
        .error-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
        }
        
        
        h1 {
            color: var(--secondary-color);
            font-size: 4em;
            font-weight: 700;
            margin-bottom: 10px;
            line-height: 1;
              text-align: center;
        }
        
        h2 {
            color: var(--dark-color);
            font-size: 1.8em;
            margin-bottom: 20px;
            font-weight: 600;
             text-align: center;
        }
        
        p {
            font-size: 1.1em;
            margin-bottom: 30px;
            color: #666;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 28px;
            border-radius: 50px;
            font-size: 1em;
            font-weight: 500;
            text-decoration: none;
            transition: var(--transition);
            border: none;
            cursor: pointer;
        }
        
        .btn-primary {
            background-color: var(--primary-color);
            color: var(--white);
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
        }
        
        .btn-primary:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(52, 152, 219, 0.4);
        }
        
        .btn-secondary {
            background-color: var(--light-color);
            color: var(--dark-color);
        }
        
        .btn-secondary:hover {
            background-color: #d5dbdb;
            transform: translateY(-2px);
        }
        
        .game-categories {
            margin-top: 40px;
            text-align: center;
        }
        
        .game-categories h3 {
            color: var(--primary-color);
            font-size: 1.4em;
            margin-bottom: 20px;
            position: relative;
            display: inline-block;
            padding-bottom: 10px;
        }
        
        .game-categories h3::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 3px;
        }
        
        .category-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
        }
        
        .category-item {
            background: var(--light-color);
            padding: 10px 22px;
            border-radius: 50px;
            font-size: 0.95em;
            text-decoration: none;
            color: var(--dark-color);
            transition: var(--transition);
            border: 1px solid #ddd;
        }
        
        .category-item:hover {
            background: var(--primary-color);
            color: var(--white);
            border-color: var(--primary-color);
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(52, 152, 219, 0.2);
        }
        
        footer {
            margin-top: 50px;
            font-size: 0.9em;
            color: #777;
        }
        
        .search-box {
            max-width: 500px;
            margin: 0 auto 30px;
            position: relative;
        }
        
        .search-input {
            width: 100%;
            padding: 14px 20px;
            border-radius: 50px;
            border: 1px solid #ddd;
            font-size: 1em;
            padding-right: 50px;
            transition: var(--transition);
        }
        
        .search-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
        }
        
        .search-btn {
            position: absolute;
            right: 5px;
            top: 5px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .search-btn:hover {
            background: #2980b9;
        }
        
        @media (max-width: 768px) {
            .error-card {
                padding: 30px 20px;
            }
            
            h1 {
                font-size: 3em;
            }
            
            h2 {
                font-size: 1.4em;
            }
            
            .btn {
                padding: 10px 20px;
                font-size: 0.9em;
            }
            
            .category-item {
                padding: 8px 16px;
                font-size: 0.85em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-card">
            <h1>404</h1>
            <h2>哎呀，页面迷路了！</h2>
            <p>您访问的页面可能已被移除、更名或暂时不可用。别担心，我们有很多好玩的游戏等着您！</p>
            
            <div class="search-box">
                <input type="text" class="search-input" placeholder="搜索您想玩的游戏...">
                <button class="search-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </button>
            </div>
            
            <div class="btn-group">
                <a href="/" class="btn btn-primary">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                    返回首页
                </a>
                <a href="/?category=最近上新" class="btn btn-secondary">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;">
                        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                        <line x1="8" y1="21" x2="16" y2="21"></line>
                        <line x1="12" y1="17" x2="12" y2="21"></line>
                    </svg>
                    浏览最近上新
                </a>
            </div>
            
            <div class="game-categories">
                <h3>热门游戏分类</h3>
                <div class="category-list">
                    <a href="/?category=最近上新" class="category-item">最近上新</a>
                    <a href="/?category=all" class="category-item">全部游戏</a>
                    <a href="/?category=3D" class="category-item">3D游戏</a>
                    <a href="/?category=cocos2d" class="category-item">cocos2d</a>
                    <a href="/?category=fc红白机" class="category-item">红白机</a>
                    <a href="/?category=GBA" class="category-item">GBA</a>
                    <a href="/?category=休闲" class="category-item">休闲</a>
                    <a href="/?category=其他" class="category-item">其他</a>
                    <a href="/?category=动作" class="category-item">动作</a>
                    <a href="/?category=反应" class="category-item">反应</a>
                    <a href="/?category=棋牌" class="category-item">棋牌</a>
                    <a href="/?category=益智" class="category-item">益智</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 简单的搜索功能
        document.querySelector('.search-btn').addEventListener('click', function() {
            const searchTerm = document.querySelector('.search-input').value.trim();
            if(searchTerm) {
                window.location.href = '/?search=' + encodeURIComponent(searchTerm);
            }
        });
        
        document.querySelector('.search-input').addEventListener('keypress', function(e) {
            if(e.key === 'Enter') {
                const searchTerm = this.value.trim();
                if(searchTerm) {
                    window.location.href = '/?search=' + encodeURIComponent(searchTerm);
                }
            }
        });
    </script>
</body>
</html>
